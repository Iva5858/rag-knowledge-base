name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install pyyaml python-dotenv pydantic

      - name: Check syntax on all Python files
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./__pycache__/*" \
            | xargs python -m py_compile && echo "All files compile OK"

      - name: Check config loads
        run: |
          # Provide dummy env vars so Config() doesn't raise on missing keys
          TELEGRAM_BOT_TOKEN=dummy \
          OPENAI_API_KEY=dummy \
          python -c "
          import shutil, sys
          # Stub ffmpeg check so CI doesn't need the binary
          shutil.which = lambda x: '/usr/bin/ffmpeg' if x == 'ffmpeg' else None
          from config import Config
          c = Config()
          assert c.obsidian.vault_path, 'vault_path must be set'
          print('Config loads OK:', c.obsidian.vault_path)
          "

      - name: Check schema
        run: |
          python -c "
          from models.schema import KnowledgeEntry, SearchResult, ExtractionOutput
          e = KnowledgeEntry(
              id='ci-test', date='2026-01-01T00:00:00Z',
              input_type='TEXT', raw_text='test',
              title='Test', concept='Test concept.',
              tags=['python'], difficulty='beginner',
          )
          assert e.embed_text, 'embed_text must be non-empty'
          print('Schema OK, embed_text:', e.embed_text)
          "
